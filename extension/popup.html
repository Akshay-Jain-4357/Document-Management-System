<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OfficeGit Extension</title>
  <style>
    body {
      width: 320px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #0a0f1a;
      color: #e2e8f0;
    }
    .header {
      background-color: #1e293b;
      padding: 12px 16px;
      border-bottom: 1px solid #334155;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header span { color: #60a5fa; }
    .content {
      padding: 16px;
    }
    .form-group {
      margin-bottom: 12px;
    }
    label {
      display: block;
      font-size: 12px;
      margin-bottom: 4px;
      color: #94a3b8;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 8px;
      box-sizing: border-box;
      background: #1e293b;
      border: 1px solid #475569;
      color: #fff;
      border-radius: 4px;
    }
    input[type="file"] {
      width: 100%;
      font-size: 12px;
      color: #cbd5e1;
    }
    button {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 500;
      margin-top: 8px;
    }
    button:hover { background: #1d4ed8; }
    button:disabled { background: #475569; cursor: not-allowed; }
    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
    }
    .error { color: #ef4444; }
    .success { color: #22c55e; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="header">
    <span>🐙</span> OfficeGit
  </div>
  
  <div class="content">
    <!-- Unauthenticated View -->
    <div id="login-view">
      <div class="form-group">
        <label>Email</label>
        <input type="text" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button id="login-btn">Log In</button>
    </div>

    <!-- Authenticated View -->
    <div id="upload-view" class="hidden">
      <div style="font-size: 11px; margin-bottom: 12px; color: #94a3b8; text-align: right;">
        Logged in • <a href="#" id="logout-link" style="color: #ef4444; text-decoration: none;">Logout</a>
      </div>
      <div class="form-group">
        <label>File (.txt or .pdf)</label>
        <input type="file" id="file" accept=".txt,.pdf">
      </div>
      <div class="form-group">
        <label>Title (Optional)</label>
        <input type="text" id="title" placeholder="Document Title">
      </div>
      <div class="form-group">
        <label>Commit Message</label>
        <input type="text" id="message" placeholder="Initial commit">
      </div>
      <button id="upload-btn">Upload to OfficeGit</button>
    </div>

    <div id="status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
