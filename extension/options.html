<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>OfficeGit — Settings</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body class="options-body">
  <div class="options-card">
    <h1 class="options-title">
      <span style="background: linear-gradient(135deg, #4f46e5, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">OfficeGit</span> Settings
    </h1>
    <p class="options-subtitle">Configure your OfficeGit extension preferences</p>

    <div class="form-group">
      <label for="api-url">API Base URL</label>
      <input type="text" id="api-url" placeholder="http://localhost:5000/api">
      <p class="text-xs text-muted mt-8">
        For local development use <strong>http://localhost:5000/api</strong><br>
        For production use your Render URL, e.g. <strong>https://your-app.onrender.com/api</strong>
      </p>
    </div>

    <div class="form-group">
      <label for="frontend-url">Frontend URL <span class="optional">(optional)</span></label>
      <input type="text" id="frontend-url" placeholder="http://localhost:5173">
      <p class="text-xs text-muted mt-8">
        Used for "Open in OfficeGit" links. Leave blank for auto-detection.
      </p>
    </div>

    <button class="btn btn-primary" id="save-btn" style="margin-top: 16px;">
      <span class="btn-text">Save Settings</span>
    </button>

    <div id="status" class="mt-8 text-center text-xs text-muted"></div>
  </div>

  <script src="options.js"></script>
</body>
</html>
